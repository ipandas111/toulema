version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jobtrack:jobtrack@db:5432/jobtrack
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://jobtrack:jobtrack@db:5432/jobtrack
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobtrack
      POSTGRES_PASSWORD: jobtrack
      POSTGRES_DB: jobtrack
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
  chroma_data:
